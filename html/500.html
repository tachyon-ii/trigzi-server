<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 Internal Error - Trigzi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
html, body {
  background: #000000;
  font-family: 'Montserrat', -apple-system, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: #f5f5f5;
}

.container {
  text-align: center;
  position: relative;
  z-index: 10;
  padding: 2rem;
  max-width: 550px;
  width: 100%;
}

.barcode-wrapper {
  height: 160px; 
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
  overflow: visible;
}

.barcode {
  display: flex;
  align-items: flex-start;
  gap: 3px;
}

.bar {
  background: #f5f5f5;
  border-radius: 1px;
  flex-shrink: 0;
  will-change: transform, background-color; 
}

.bar.falling {
  animation: cascade 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
  animation-delay: var(--delay);
  transform-origin: bottom center;
}

@keyframes cascade {
  0% { transform: translate(0, 0) rotate(0deg); background: #f5f5f5; }
  15% { background: #EA4335; }
  75% { 
    transform: translate(var(--endX), var(--endY)) rotate(var(--rot)); 
    background: #EA4335; 
    animation-timing-function: ease-out;
  }
  85% { 
    transform: translate(calc(var(--endX) * 1.05), calc(var(--endY) - 8px)) rotate(calc(var(--rot) * 1.05)); 
    background: #EA4335; 
    animation-timing-function: ease-in;
  }
  100% { 
    transform: translate(var(--endX), var(--endY)) rotate(var(--rot)); 
    background: #EA4335; 
  }
}

.error-code {
  font-size: 6.5rem;
  font-weight: 900;
  color: #EA4335; 
  margin: 0;
  line-height: 1;
  letter-spacing: -3px;
}

.message {
  font-size: 1.75rem;
  color: #f5f5f5;
  margin: 1rem 0 0.5rem;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.sub-message {
  color: #a3a3a3;
  margin-bottom: 2.5rem;
  line-height: 1.6;
  font-size: 1rem;
}

.btn {
  display: inline-block;
  background-color: #EA4335; 
  color: #fff;
  text-decoration: none;
  padding: 16px 40px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.5px;
  transition: all 0.2s ease;
}

.btn:hover {
  background-color: #d33828; 
  transform: translateY(-2px);
}
</style>
</head>
<body>

  <div class="container">
    <div class="barcode-wrapper">
      <div class="barcode" id="barcode"></div>
    </div>

    <h1 class="error-code">500</h1>
    <div class="message">Parsing Engine Failure</div>
    <div class="sub-message">The sequence snapped. The system encountered an unrecoverable exception and the event has been logged to telemetry.</div>
    
    <a href="index.html" class="btn">Return to Safety</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const barcodeContainer = document.getElementById('barcode');
        const barCount = 50; 
        const barHeight = 80; 
        let html = '';

        for (let i = 0; i < barCount; i++) {
            const width = Math.floor(Math.random() * 5) + 2;
            const isStable = i < (barCount * 0.35);

            if (isStable) {
                html += `<div class="bar" style="width: ${width}px; height: ${barHeight}px;"></div>`;
            } else {
                const delay = ((barCount - 1 - i) * 0.05).toFixed(2);
                const endX = ((Math.random() - 0.5) * 100).toFixed(1); 
                const endY = (80 + Math.random() * 20).toFixed(1); 
                const rot = ((Math.random() - 0.5) * 160).toFixed(1);

                html += `<div class="bar falling" style="width: ${width}px; height: ${barHeight}px; --delay: ${delay}s; --endX: ${endX}px; --endY: ${endY}px; --rot: ${rot}deg;"></div>`;
            }
        }
        
        barcodeContainer.innerHTML = html;
    });
  </script>
</body>
</html>
