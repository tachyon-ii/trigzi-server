<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found - Trigzi</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html, body {
  background: #000000; 
  font-family: 'Montserrat', -apple-system, sans-serif;
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f5f5f5;
  overflow: hidden;
}

* { box-sizing: border-box; }

.box {
  width: 100%;
  max-width: 400px;
  height: 400px;
  position: relative;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

.box__ghost {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
}

.symbol:nth-child(1) { opacity: .15; animation: shine 4s ease-in-out 3s infinite; }
.symbol:nth-child(1):before, .symbol:nth-child(1):after { content: ''; width: 12px; height: 4px; background: #4285F4; position: absolute; border-radius: 5px; bottom: 65px; left: -20px; }
.symbol:nth-child(1):before { transform: rotate(45deg); }
.symbol:nth-child(1):after { transform: rotate(-45deg); }

.symbol:nth-child(2) { position: absolute; left: -25px; top: 10px; height: 18px; width: 18px; border: 4px solid #4285F4; border-radius: 50%; opacity: .15; animation: shine 4s ease-in-out 1.3s infinite; }

.symbol:nth-child(3) { opacity: .15; animation: shine 3s ease-in-out .5s infinite; }
.symbol:nth-child(3):before, .symbol:nth-child(3):after { content: ''; width: 12px; height: 4px; background: #4285F4; position: absolute; border-radius: 5px; top: -15px; left: 40px; }
.symbol:nth-child(3):before { transform: rotate(90deg); }
.symbol:nth-child(3):after { transform: rotate(180deg); }

.symbol:nth-child(4) { opacity: .15; animation: shine 6s ease-in-out 1.6s infinite; }
.symbol:nth-child(4):before, .symbol:nth-child(4):after { content: ''; width: 15px; height: 4px; background: #4285F4; position: absolute; border-radius: 5px; top: 10px; right: -10px; }
.symbol:nth-child(4):before { transform: rotate(45deg); }
.symbol:nth-child(4):after { transform: rotate(-45deg); }

.symbol:nth-child(5) { position: absolute; right: -20px; top: 50px; height: 12px; width: 12px; border: 3px solid #4285F4; border-radius: 50%; opacity: .15; animation: shine 1.7s ease-in-out 7s infinite; }

.box__ghost-container {
  background: #f5f5f5; 
  width: 100px;
  height: 100px;
  border-radius: 100px 100px 0 0;
  position: relative;
  margin: 0 auto;
  animation: upndown 3s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(66, 133, 244, 0.2); 
}

.box__ghost-eyes {
  position: absolute;
  left: 50%;
  top: 45%;
  height: 12px;
  width: 60px;
  transform: translate(-50%, 0);
  transition: transform 0.1s ease-out; 
}

.box__eye-left, .box__eye-right {
  width: 14px;
  height: 14px;
  background: #121212;
  border-radius: 50%;
  margin: 0 8px;
  position: absolute;
}

.box__eye-left { left: 0; }
.box__eye-right { right: 0; }

.box__ghost-bottom {
  display: flex;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
}

.box__ghost-bottom div {
  flex-grow: 1;
  position: relative;
  top: -10px;
  height: 20px;
  border-radius: 100%;
  background-color: #f5f5f5;
}

/* Match the pure black background */
.box__ghost-bottom div:nth-child(2n) {
  top: -12px;
  margin: 0;
  border-top: 15px solid #000000; 
  background: transparent;
}

.box__ghost-shadow {
  height: 15px;
  box-shadow: 0 40px 20px 5px rgba(66, 133, 244, 0.3); 
  border-radius: 50%;
  margin: 0 auto;
  animation: smallnbig 3s ease-in-out infinite;
}

.box__description {
  text-align: center;
  width: 100%;
  z-index: 10;
}

.box__description-title {
  font-size: 1.8rem;
  letter-spacing: 0.5px;
  font-weight: 700;
  color: #4285F4; 
  margin-bottom: 0.5rem;
}

.box__description-text {
  font-size: 0.95rem;
  line-height: 1.5;
  color: #a3a3a3;
  margin-bottom: 2rem;
}

.btn {
  display: inline-block;
  background: #4285F4; 
  border-radius: 50px;
  height: 48px;
  text-align: center;
  text-decoration: none;
  color: #fff;
  line-height: 48px;
  font-size: 1rem;
  font-weight: 600;
  padding: 0 40px;
  transition: background 0.2s ease, transform 0.2s ease;
}

.btn:hover {
  background: #2a6bdc;
  transform: translateY(-2px);
}

@keyframes upndown {
  0% {transform: translateY(5px);}
  50% {transform: translateY(15px);}
  100% {transform: translateY(5px);}
}
@keyframes smallnbig {
  0% {width: 70px;}
  50% {width: 85px;}
  100% {width: 70px;}
}
@keyframes shine {
  0% {opacity: .15;}
  25% {opacity: .05;}
  50% {opacity: .15;}
  100% {opacity: .15;}
}
</style>
</head>
<body>

<div class="box">
  <div class="box__ghost">
    <div class="symbol"></div>
    <div class="symbol"></div>
    <div class="symbol"></div>
    <div class="symbol"></div>
    <div class="symbol"></div>
    
    <div class="box__ghost-container">
      <div class="box__ghost-eyes">
        <div class="box__eye-left"></div>
        <div class="box__eye-right"></div>
      </div>
      <div class="box__ghost-bottom">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
    <div class="box__ghost-shadow"></div>
  </div>
  
  <div class="box__description">
    <div class="box__description-title">404 Error</div>
    <div class="box__description-text">The coordinates you requested lead to empty space.</div>
    <a href="index.html" class="btn">Return to Safety</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const eyes = document.querySelector('.box__ghost-eyes');
    if (!eyes) return;
    let ticking = false;

    document.addEventListener('mousemove', (e) => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                const pageX = window.innerWidth;
                const pageY = window.innerHeight;
                const xAxis = ((e.pageX / pageX) * 100) - 50; 
                const yAxis = ((e.pageY / pageY) * 100) - 50; 
                const moveX = (xAxis / 50) * 12; 
                const moveY = (yAxis / 50) * 8;  

                eyes.style.transform = `translate(calc(-50% + ${moveX}px), ${moveY}px)`;
                ticking = false;
            });
            ticking = true;
        }
    });
});
</script>

</body>
</html>
